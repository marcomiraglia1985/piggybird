<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <title>Piggybird — caricamento</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: linear-gradient(135deg, #fafafe 0%, #f0f0fa 100%);
        color: #1a1a2e;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        text-align: center;
        max-width: 360px;
      }
      .icon {
        width: 96px;
        height: 96px;
        margin: 0 auto 16px;
        display: block;
      }
      .icon img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      h1 {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: -0.01em;
        margin-bottom: 8px;
      }
      p {
        font-size: 13px;
        color: #6b7280;
        line-height: 1.5;
      }
      .spinner {
        margin-top: 20px;
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid #e0e0eb;
        border-top-color: #8b5cf6;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .err {
        color: #dc2626;
        margin-top: 16px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon"><img src="piggybird-icon.png" alt="Piggybird" /></div>
      <h1>Piggybird sta avviando…</h1>
      <p id="status">Inizializzazione del database…</p>
      <div class="spinner" id="spin"></div>
      <p class="err" id="err" style="display: none"></p>
    </div>
    <script>
      // Solo cosmetic: aggiorno il messaggio dopo qualche secondo. La navigation
      // verso localhost è gestita da Rust (lib.rs::wait_and_navigate) — il
      // WebView non può fare fetch http:// da scheme file:// (security policy).
      const status = document.getElementById("status");
      let elapsed = 0;
      setInterval(() => {
        elapsed += 1;
        if (elapsed > 4) status.textContent = "Avvio del server in corso…";
        if (elapsed > 12) status.textContent = "Sta richiedendo più tempo del previsto…";
        if (elapsed > 30) {
          document.getElementById("spin").style.display = "none";
          status.textContent = "Avvio fallito.";
          const err = document.getElementById("err");
          err.style.display = "block";
          err.textContent =
            "Il server interno non risponde dopo 30 secondi. Prova a chiudere e riaprire la app.";
        }
      }, 1000);
    </script>
  </body>
</html>
